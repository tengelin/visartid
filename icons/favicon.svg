<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Clock border -->
  <circle cx="32" cy="32" r="30" fill="#fff" stroke="#222" stroke-width="2.5"/>

  <!-- 15-min red wedge: counterclockwise from 12 o'clock to 9 o'clock -->
  <path d="M32,32 L32,4 A28,28 0 0,0 4,32 Z" fill="rgb(174,10,10)"/>

  <!-- White center circle -->
  <circle cx="32" cy="32" r="17" fill="#fff"/>

  <!-- Tick marks (outer R=28, inner R=23 thin / R=22 thick) -->
  <g stroke="#222" stroke-linecap="round">
    <!-- 0 min  (top)         --> <line x1="32"   y1="4"     x2="32"   y2="10"   stroke-width="2.5"/>
    <!-- 5 min  (upper-left)  --> <line x1="18"   y1="7.8"   x2="20.5" y2="12.1" stroke-width="1.5"/>
    <!-- 10 min (left-upper)  --> <line x1="7.8"  y1="18"    x2="12.1" y2="20.5" stroke-width="1.5"/>
    <!-- 15 min (left)        --> <line x1="4"    y1="32"    x2="10"   y2="32"   stroke-width="2.5"/>
    <!-- 20 min (lower-left)  --> <line x1="7.8"  y1="46"    x2="12.1" y2="43.5" stroke-width="1.5"/>
    <!-- 25 min (bottom-left) --> <line x1="18"   y1="56.2"  x2="20.5" y2="51.9" stroke-width="1.5"/>
    <!-- 30 min (bottom)      --> <line x1="32"   y1="60"    x2="32"   y2="54"   stroke-width="2.5"/>
    <!-- 35 min (bottom-right)--> <line x1="46"   y1="56.2"  x2="43.5" y2="51.9" stroke-width="1.5"/>
    <!-- 40 min (right-lower) --> <line x1="56.2" y1="46"    x2="51.9" y2="43.5" stroke-width="1.5"/>
    <!-- 45 min (right)       --> <line x1="60"   y1="32"    x2="54"   y2="32"   stroke-width="2.5"/>
    <!-- 50 min (upper-right) --> <line x1="56.2" y1="18"    x2="51.9" y2="20.5" stroke-width="1.5"/>
    <!-- 55 min (top-right)   --> <line x1="46"   y1="7.8"   x2="43.5" y2="12.1" stroke-width="1.5"/>
  </g>
</svg>
