<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
    <title>TimerUp</title>
    <link rel="stylesheet" type="text/css" href="styles/main.css">
</head>
<body>
    <div class="t-table">
        <div class="t-cell">
            <div id="time">
                <div id="clock-face">
                    <div class="nr nr55">55</div>
                    <div class="nr nr50">50</div>
                    <div class="nr nr45">45</div>
                    <div class="nr nr40">40</div>
                    <div class="nr nr35">35</div>
                    <div class="nr nr30">30</div>
                    <div class="nr nrL nr25">25</div>
                    <div class="nr nrL nr20">20</div>
                    <div class="nr nrL nr15">15</div>
                    <div class="nr nrL nr10">10</div>
                    <div class="nr nrL nr5">5</div>
                    <div class="nr nr0">0</div>
                    <div id="minute5"></div>
                    <div id="clock"></div>
                    <div id="innerclock"></div>
                    <div id="hideTime"></div>
                    <div id="minute"></div>
                    <div id="hideMinute"></div>
                    <button id="pip" class="hidden" title="Fäst överst">&#128204;</button>
                </div>
                <div id="controls">
                    <div id="form" class="centerInfo">
                        <label for="nrOfMinutes">Min</label>
                        <input type="number" id="nrOfMinutes" min="1" max="60" step="1" value="15">
                    </div>
                    <button id="resume" class="hidden">Fortsätt</button>
                    <button id="start">Starta</button>
                    <button id="stop" class="hidden">Stoppa</button>
                    <button id="reset" class="hidden">Starta om</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="scripts/start.js"></script>
</body>
</html>
